services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: devblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ztools-api:
    build:
      context: ./zTools
      dockerfile: Dockerfile
    container_name: ztools-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ChatGPT__ApiKey: ${CHATGPT_APIKEY}
      ChatGPT__ApiUrl: ${CHATGPT_APIURL}
      ChatGPT__Model: ${CHATGPT_MODEL}
      ChatGPT__ImageApiUrl: ${CHATGPT_IMAGEAPIURL}
      MailerSend__MailSender: ${MAILERSEND__MAILSENDER}
      MailerSend__ApiURL: ${MAILERSEND__APIURL}
      MailerSend__ApiToken: ${MAILERSEND__APITOKEN}
      S3__AccessKey: ${S3__ACCESSKEY}
      S3__SecretKey: ${S3__SECRETKEY}
      S3__Endpoint: ${S3__ENDPOINT}
    ports:
      - "${ZTOOLS_PORT:-5001}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  nauth-api:
    build:
      context: ./NAuth
      dockerfile: Dockerfile
    container_name: nauth-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: "http://+:80;https://+:443"
      ConnectionStrings__NAuthContext: "Host=devblog-postgres;Port=5432;Database=nauth_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      NAuth__JwtSecret: ${JWT_SECRET}
      zTools__ApiURL: http://ztools-api:8080
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${CERTIFICATE_PASSWORD}
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/emagine.pfx
    ports:
      - "${NAUTH_HTTP_PORT:-5004}:80"
      - "${NAUTH_HTTPS_PORT:-5005}:443"
    depends_on:
      postgres:
        condition: service_healthy
      ztools-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

  nnews-api:
    build:
      context: ./NNews
      dockerfile: NNews.API.Dockerfile
    container_name: nnews-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      ConnectionStrings__NNewsContext: "Host=devblog-postgres;Port=5432;Database=nnews_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      NAuth__JwtSecret: ${JWT_SECRET}
      NAuth__ApiURL: http://nauth-api:80
      zTools__ApiURL: http://ztools-api:8080
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${CERTIFICATE_PATH:-/app/certs/certificate.pfx}
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${CERTIFICATE_PASSWORD}
    ports:
      - "${NNEWS_HTTP_PORT:-5007}:8080"
      - "${NNEWS_HTTPS_PORT:-5008}:8443"
    volumes:
      - nnews_logs:/app/logs
    depends_on:
      nauth-api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:5004}
        VITE_NEWS_API_URL: ${VITE_NEWS_API_URL:-http://localhost:5007}
    container_name: devblog-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - nauth-api
      - nnews-api

volumes:
  postgres_data:
    driver: local
  nnews_logs:
    driver: local
